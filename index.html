<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizon Web Corp</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Base styling -->
  <style>
    html { scroll-behavior: smooth; }
    body { background-color: #030305; margin: 0; padding: 0; overflow-x: hidden; }
    
    /* Enhanced 3D text shadow */
    .text-3d-shadow {
      filter: drop-shadow(0px 18px 25px rgba(0,0,0,0.9)) drop-shadow(0px 5px 8px rgba(0,0,0,0.7));
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client?deps=react@18.2.0';
    import { motion, useScroll, useTransform, AnimatePresence, useSpring, useMotionValue } from 'https://esm.sh/framer-motion@11.0.8?deps=react@18.2.0,react-dom@18.2.0';
    import { ChevronRight, Layers, Globe as GlobeIcon, ArrowRight, Code2, Menu, X, ShieldCheck, Zap, BarChart3, ExternalLink } from 'https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0,react-dom@18.2.0';
    
    // Using cobe for the dense, logical Earth mapping
    import createGlobe from 'https://esm.sh/cobe@0.6.3';

    // --- CUSTOM CURSOR ---
    const CustomCursor = () => {
      const cursorRef = useRef(null);
      const visualRef = useRef(null);

      useEffect(() => {
        if (window.matchMedia("(pointer: coarse)").matches) return;

        const onMouseMove = (e) => {
          if (cursorRef.current) {
            cursorRef.current.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
          }
        };

        const onMouseOver = (e) => {
          if (e.target.closest('a, button, .interactive-hover')) {
            if(visualRef.current) visualRef.current.style.transform = 'translate(-50%, -50%) scale(3)';
          } else {
            if(visualRef.current) visualRef.current.style.transform = 'translate(-50%, -50%) scale(1)';
          }
        };

        window.addEventListener('mousemove', onMouseMove);
        window.addEventListener('mouseover', onMouseOver);

        return () => {
          window.removeEventListener('mousemove', onMouseMove);
          window.removeEventListener('mouseover', onMouseOver);
        };
      }, []);

      return (
        <div 
          ref={cursorRef} 
          className="fixed top-0 left-0 pointer-events-none z-[9999] mix-blend-difference hidden md:block"
          style={{ willChange: 'transform' }}
        >
          <div 
            ref={visualRef}
            className="w-3 h-3 bg-white rounded-full transition-transform duration-300 ease-out"
            style={{ transform: 'translate(-50%, -50%) scale(1)' }}
          />
        </div>
      );
    };

    // --- IMMACULATE WEBGL BACKGROUND ---
    const WebGLBackground = () => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        if (!gl) return;

        let animationFrameId;

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          gl.viewport(0, 0, canvas.width, canvas.height);
        }
        resize();
        window.addEventListener('resize', resize);

        const vs = `
          attribute vec2 pos;
          void main() { gl_Position = vec4(pos, 0.0, 1.0); }
        `;
        
        const fs = `
          precision highp float;
          uniform float time;
          uniform vec2 res;
          uniform vec2 mouse;

          float hash(vec2 p) {
            p = fract(p * vec2(234.34, 435.345));
            p += dot(p, p + 34.23);
            return fract(p.x * p.y);
          }

          float noise(vec2 p) {
            vec2 i = floor(p);
            vec2 f = fract(p);
            f = f * f * (3.0 - 2.0 * f);
            return mix(
              mix(hash(i), hash(i + vec2(1,0)), f.x),
              mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),
              f.y
            );
          }

          float fbm(vec2 p) {
            float v = 0.0; float a = 0.5;
            for (int i = 0; i < 4; i++) {
              v += a * noise(p);
              p *= 2.1; a *= 0.5;
            }
            return v;
          }

          float gridLine(float v, float period, float lineWidth, float aaWidth) {
            float f = fract(v / period) * period;
            float d = min(f, period - f);
            return 1.0 - smoothstep(lineWidth - aaWidth, lineWidth + aaWidth, d);
          }

          float star(vec2 uv, float density, float size, float t) {
            vec2 cell = floor(uv);
            vec2 local = fract(uv) - 0.5;
            float h = hash(cell);
            if (h > density) return 0.0;
            vec2 offset = vec2(hash(cell + 0.1), hash(cell + 0.2)) * 0.6 - 0.3;
            float d2 = dot(local - offset, local - offset);
            float brightness = 0.4 + 0.6 * hash(cell + 0.3);
            float twinkle = 0.7 + 0.3 * sin(t * (2.0 + 3.0 * hash(cell + 0.4)) + hash(cell + 0.5) * 6.28);
            return brightness * twinkle * exp(-d2 / (size * size));
          }

          void main() {
            vec2 uv = gl_FragCoord.xy / res;
            vec2 m = mouse / res;
            uv.y = 1.0 - uv.y;
            
            // Base OLED black
            vec3 col = vec3(0.01, 0.01, 0.02);

            // Perspective grid
            float fadeY = smoothstep(0.72, 0.35, uv.y);
            if (fadeY > 0.001) {
              float horizon = 0.50;
              float depth = max(0.001, uv.y - horizon);
              float perspective = 1.0 / (depth * 14.0 + 0.3);

              float vCoord = (uv.x - 0.5) * perspective;
              float vLine = gridLine(vCoord, 0.08, 0.0015 * perspective, 0.002 * perspective);

              float hCoord = perspective;
              float hLine = gridLine(hCoord, 0.25, 0.008, 0.01);

              float g = clamp(vLine + hLine, 0.0, 1.0);
              col += vec3(0.25, 0.10, 0.70) * g * fadeY * 0.6;
            }

            // Terrain noise
            float warp = fbm(uv * 2.5 + vec2(time * 0.04, time * 0.02));
            vec2 warpedUV = uv + (warp - 0.5) * 0.12;
            float terrain = fbm(warpedUV * 3.0 + time * 0.05);

            float topoField = terrain * 6.0 + uv.y * 4.0 + time * 0.04;
            float contourDist = abs(fract(topoField) - 0.5);
            float contour = 1.0 - smoothstep(0.0, 0.02, contourDist);
            float topoFade = smoothstep(0.0, 0.5, uv.y) * smoothstep(1.0, 0.5, uv.y);
            col += vec3(0.12, 0.06, 0.35) * contour * topoFade * 0.25;

            // Mouse glow
            float dist = length(uv - m);
            float glow = exp(-dist * dist * 8.0);
            col += vec3(0.15, 0.05, 0.45) * glow * 0.6;

            // Nebulas
            float neb = fbm(uv * 1.8 + vec2(time * 0.03, 0.0));
            col += vec3(0.12, 0.04, 0.38) * neb * neb * 0.3;

            // Auroras
            float aurora1 = exp(-pow(abs(uv.y - 0.38 + sin(uv.x * 4.0 + time * 0.18) * 0.05 + sin(uv.x * 1.3 - time * 0.1) * 0.03), 2.0) * 120.0);
            float aurora2 = exp(-pow(abs(uv.y - 0.44 + sin(uv.x * 2.5 - time * 0.13) * 0.04), 2.0) * 150.0);
            col += vec3(0.0,  0.55, 0.70) * aurora1 * 0.55; 
            col += vec3(0.35, 0.0,  0.80) * aurora2 * 0.40; 

            // Stars
            float starLayer1 = star(uv * 55.0, 0.04, 0.18, time);
            float starLayer2 = star(uv * 90.0, 0.05, 0.12, time * 1.3);
            float starMask = smoothstep(0.55, 0.15, uv.y); 
            col += vec3(0.85, 0.90, 1.0) * (starLayer1 + starLayer2 * 0.6) * starMask * 0.9;

            // Vignette
            float vig = 1.0 - dot(uv - 0.5, (uv - 0.5) * vec2(1.2, 1.6));
            col *= clamp(vig, 0.0, 1.0);

            gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
          }
        `;

        function compileShader(type, src) {
          const s = gl.createShader(type);
          gl.shaderSource(s, src);
          gl.compileShader(s);
          return s;
        }

        const prog = gl.createProgram();
        gl.attachShader(prog, compileShader(gl.VERTEX_SHADER, vs));
        gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, fs));
        gl.linkProgram(prog);
        gl.useProgram(prog);

        const buf = gl.createBuffer();
        gl.bindBuffer(gl.ARRAY_BUFFER, buf);
        gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
        const posLoc = gl.getAttribLocation(prog, 'pos');
        gl.enableVertexAttribArray(posLoc);
        gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

        const uTime = gl.getUniformLocation(prog, 'time');
        const uRes = gl.getUniformLocation(prog, 'res');
        const uMouse = gl.getUniformLocation(prog, 'mouse');

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        
        const onMouseMove = (e) => {
          mouseX = e.clientX;
          mouseY = e.clientY;
        };
        document.addEventListener('mousemove', onMouseMove);

        function render(t) {
          gl.uniform1f(uTime, t * 0.001);
          gl.uniform2f(uRes, canvas.width, canvas.height);
          gl.uniform2f(uMouse, mouseX, mouseY);
          gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
          animationFrameId = requestAnimationFrame(render);
        }
        render(0);

        return () => {
          window.removeEventListener('resize', resize);
          document.removeEventListener('mousemove', onMouseMove);
          cancelAnimationFrame(animationFrameId);
        };
      }, []);

      return <canvas ref={canvasRef} className="fixed inset-0 w-full h-full pointer-events-none z-0" />;
    };

    // --- FRAMER MOTION STARFIELD ---
    function Starfield() {
      const [stars, setStars] = useState([]);

      useEffect(() => {
        const generateStars = () => {
          const newStars = [];
          for (let i = 0; i < 150; i++) {
            newStars.push({
              id: i,
              x: Math.random() * 100,
              y: Math.random() * 100,
              size: Math.random() * 2 + 0.5,
              delay: Math.random() * 5,
              duration: Math.random() * 3 + 2,
            });
          }
          setStars(newStars);
        };
        generateStars();
      }, []);

      return (
        <div className="absolute inset-0 z-0 overflow-hidden pointer-events-none opacity-80">
          {stars.map((star) => (
            <motion.div
              key={star.id}
              className="absolute rounded-full bg-white shadow-[0_0_8px_rgba(255,255,255,0.8)]"
              style={{
                left: `${star.x}%`,
                top: `${star.y}%`,
                width: star.size,
                height: star.size,
              }}
              animate={{
                opacity: [0, 0.8, 0],
                scale: [1, 1.2, 1],
              }}
              transition={{
                duration: star.duration,
                delay: star.delay,
                repeat: Infinity,
                ease: "easeInOut",
              }}
            />
          ))}
        </div>
      );
    }

    // --- INTERACTIVE HOLOGRAPHIC GLOBE (WITH COBE) ---
    function Globe({ mouseX, mouseY }) {
      const canvasRef = useRef(null);

      useEffect(() => {
        let phi = 0;
        let width = 0;
        
        const onResize = () => {
          if (canvasRef.current) {
            width = canvasRef.current.offsetWidth;
          }
        };
        window.addEventListener('resize', onResize);
        onResize();

        if (!canvasRef.current) return;

        // Uses cobe for dense, highly logical mapping of earth
        const globe = createGlobe(canvasRef.current, {
          devicePixelRatio: 2,
          width: width * 2,
          height: width * 2,
          phi: 0,
          theta: 0.3,
          dark: 1, 
          diffuse: 1.2,
          mapSamples: 24000, 
          mapBrightness: 8,
          baseColor: [0.03, 0.03, 0.08], // Deep dark core
          markerColor: [0.13, 0.82, 0.93], // Cyan markers
          glowColor: [0.1, 0.2, 0.5], // Internal cobe glow
          markers: [
            { location: [37.7595, -122.4367], size: 0.05 }, // SF
            { location: [40.7128, -74.0060], size: 0.04 }, // NY
            { location: [51.5074, -0.1278], size: 0.06 }, // London
            { location: [35.6895, 139.6917], size: 0.05 }, // Tokyo
            { location: [-33.8688, 151.2093], size: 0.04 }, // Sydney
            { location: [1.3521, 103.8198], size: 0.05 }, // Singapore
          ],
          onRender: (state) => {
            phi += 0.003; 
            
            // Smooth mouse tracking mapped onto the globe
            state.phi = phi + (mouseX.get() / window.innerWidth) * 1.5;
            state.theta = 0.3 + (mouseY.get() / window.innerHeight) * 0.5;
            state.width = width * 2;
            state.height = width * 2;
          }
        });

        return () => {
          globe.destroy();
          window.removeEventListener('resize', onResize);
        };
      }, [mouseX, mouseY]);

      return (
        <div className="relative w-full h-full max-w-[600px] aspect-square mx-auto flex items-center justify-center">
          {/* Aesthetic glow layers around the globe for holographic effect */}
          <div className="absolute inset-0 rounded-full bg-gradient-to-tr from-[#3b82f6]/20 to-[#8b5cf6]/20 blur-3xl animate-[spin_10s_linear_infinite]" />
          <div className="absolute inset-4 rounded-full bg-[#06b6d4]/10 blur-xl animate-[pulse_4s_ease-in-out_infinite]" />
          
          <canvas
            ref={canvasRef}
            className="relative z-10 w-full h-full opacity-90 drop-shadow-[0_0_30px_rgba(34,211,238,0.25)] mix-blend-screen"
            style={{ contain: 'layout paint size' }}
          />
        </div>
      );
    }

    // --- MODERN UI COMPONENTS ---
    const BentoCard = ({ children, className = "", hoverEffect = false, bgClass = "bg-[#0A0A0E]/80" }) => (
      <div className={`relative overflow-hidden rounded-3xl border border-white/5 ${bgClass} backdrop-blur-xl shadow-2xl transition-all duration-500 interactive-hover ${hoverEffect ? 'hover:bg-[#111118]/90 hover:border-[#8b5cf6]/30 group' : ''} ${className}`}>
        {hoverEffect && (
          <div className="absolute inset-0 bg-gradient-to-br from-[#06b6d4]/0 via-transparent to-[#8b5cf6]/0 group-hover:from-[#06b6d4]/5 group-hover:to-[#8b5cf6]/5 transition-all duration-500 pointer-events-none" />
        )}
        <div className="relative z-10 p-8 md:p-10 h-full flex flex-col justify-start">
          {children}
        </div>
      </div>
    );

    const PillButton = ({ children, primary, href }) => (
      <a href={href} className={`px-6 py-3 md:px-8 md:py-4 rounded-full font-sans font-semibold text-sm md:text-base flex items-center justify-center gap-2 transition-all duration-300 active:scale-95 w-full sm:w-auto interactive-hover ${
        primary 
        ? 'bg-white text-black hover:bg-slate-200 shadow-[0_0_20px_rgba(255,255,255,0.15)] hover:shadow-[0_0_30px_rgba(255,255,255,0.3)] border-none' 
        : 'bg-[#0A0A0E]/80 text-white border border-white/10 hover:border-white/30 hover:bg-white/10 backdrop-blur-md'
      }`}>
        {children}
      </a>
    );

    const TrailDivider = () => (
      <div className="relative h-32 w-full overflow-hidden flex justify-center opacity-80">
        <div className="absolute inset-0 bg-gradient-to-b from-transparent via-[#7c3aed]/5 to-transparent" />
        <div className="absolute top-0 w-[1px] h-full bg-gradient-to-b from-transparent via-[#8b5cf6] to-transparent" />
      </div>
    );

    const Nav = () => {
      const [isOpen, setIsOpen] = useState(false);
      const [scrolled, setScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const navLinks = [
        { name: 'Services', id: 'services' },
        { name: 'Process', id: 'process' },
        { name: 'Work', id: 'work' },
        { name: 'Clients', id: 'clients' }
      ];

      return (
        <>
          <header className={`fixed top-0 w-full z-50 transition-all duration-500 ${scrolled ? 'py-4 bg-[#030305]/90 backdrop-blur-2xl border-b border-white/5' : 'py-6 bg-transparent'}`}>
            <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
              <div className="flex items-center gap-3 interactive-hover cursor-pointer" onClick={() => window.scrollTo(0,0)}>
                <span className="text-2xl font-syne font-extrabold tracking-tight text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                  HWC
                </span>
              </div>

              <nav className="hidden md:flex items-center gap-10">
                {navLinks.map((item) => (
                  <a key={item.name} href={`#${item.id}`} className="relative text-xs font-mono font-medium text-slate-400 hover:text-white transition-colors uppercase tracking-[0.1em] group interactive-hover">
                    {item.name}
                    <span className="absolute -bottom-1.5 left-0 w-0 h-[1px] bg-[#22d3ee] transition-all duration-300 group-hover:w-full" />
                  </a>
                ))}
              </nav>

              <div className="hidden md:flex items-center">
                <a href="#clients" className="px-6 py-2.5 rounded border border-white/10 text-white font-mono font-medium text-xs uppercase tracking-widest hover:bg-white hover:text-black transition-all interactive-hover">
                  Start Project
                </a>
              </div>

              <button className="md:hidden text-white p-2" onClick={() => setIsOpen(!isOpen)}>
                {isOpen ? <X className="w-6 h-6" /> : <Menu className="w-6 h-6" />}
              </button>
            </div>
          </header>

          <AnimatePresence>
            {isOpen && (
              <motion.div 
                initial={{ opacity: 0, y: -20 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: -20 }}
                className="fixed inset-0 h-screen z-40 bg-[#030305]/98 backdrop-blur-3xl pt-28 px-6 flex flex-col gap-6 md:hidden overflow-y-auto pb-10"
              >
                {navLinks.map((item) => (
                  <a key={item.name} href={`#${item.id}`} onClick={() => setIsOpen(false)} className="text-2xl font-syne font-semibold text-white border-b border-white/5 pb-4">{item.name}</a>
                ))}
                <a href="#clients" onClick={() => setIsOpen(false)} className="mt-8 px-6 py-4 rounded bg-white text-black font-sans font-bold text-lg text-center w-full shadow-lg shadow-white/10 block">
                  Start Project
                </a>
              </motion.div>
            )}
          </AnimatePresence>
        </>
      );
    };

    // --- MAIN APPLICATION ---
    function App() {
      const containerRef = useRef(null);
      
      const { scrollYProgress } = useScroll({
        target: containerRef,
        offset: ["start start", "end start"]
      });
      
      const yText = useTransform(scrollYProgress, [0, 1], [0, 300]);
      const opacityText = useTransform(scrollYProgress, [0, 0.8, 1], [1, 0.2, 0]);

      const mouseX = useMotionValue(typeof window !== 'undefined' ? window.innerWidth / 2 : 0);
      const mouseY = useMotionValue(typeof window !== 'undefined' ? window.innerHeight / 2 : 0);
      
      const smoothX = useSpring(mouseX, { damping: 50, stiffness: 400 });
      const smoothY = useSpring(mouseY, { damping: 50, stiffness: 400 });

      useEffect(() => {
        const handleMouseMove = (e) => {
          mouseX.set(e.clientX);
          mouseY.set(e.clientY);
        };
        window.addEventListener('mousemove', handleMouseMove);
        return () => window.removeEventListener('mousemove', handleMouseMove);
      }, [mouseX, mouseY]);

      const lines = ["WE ENGINEER", "DIGITAL", "ODYSSEYS."];

      return (
        <div className="bg-transparent min-h-screen text-slate-200 font-sans selection:bg-[#8b5cf6]/40 selection:text-white overflow-x-hidden custom-cursor-wrapper">
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap');
            .font-syne { font-family: 'Syne', sans-serif; }
            .font-mono { font-family: 'JetBrains Mono', monospace; }
            .font-sans { font-family: 'Space Grotesk', sans-serif; }
            .font-inter { font-family: 'Inter', sans-serif; }
            @media (pointer: fine) { body { cursor: none; } }
          `}} />
          
          <CustomCursor />
          <WebGLBackground />
          <Nav />

          {/* --- REFINED HERO SECTION --- */}
          <section ref={containerRef} className="relative min-h-screen flex items-center justify-center pt-32 pb-20 overflow-hidden bg-transparent z-10">
            
            <div className="absolute inset-0 bg-gradient-to-b from-[#020205] via-[#020205] to-transparent z-0 pointer-events-none" />

            <div className="absolute inset-0 z-0 pointer-events-none" style={{ maskImage: 'linear-gradient(to bottom, black 70%, transparent 100%)', WebkitMaskImage: 'linear-gradient(to bottom, black 70%, transparent 100%)' }}>
              <Starfield />
              
              <motion.div 
                className="absolute top-0 left-0 w-[800px] h-[800px] rounded-full blur-[120px] opacity-30 pointer-events-none z-0"
                style={{ 
                  background: 'radial-gradient(circle, rgba(59,130,246,0.8) 0%, rgba(147,51,234,0.3) 50%, transparent 70%)',
                  x: useTransform(smoothX, v => v - 400),
                  y: useTransform(smoothY, v => v - 400)
                }} 
              />
              
              <div className="absolute inset-x-0 bottom-0 top-0 bg-[linear-gradient(to_right,#4f4f4f2e_1px,transparent_1px),linear-gradient(to_bottom,#4f4f4f2e_1px,transparent_1px)] bg-[size:54px_54px] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#000_70%,transparent_100%)] pointer-events-none z-0" />
            </div>

            <motion.div 
              style={{ y: yText, opacity: opacityText }}
              className="container mx-auto px-6 max-w-7xl relative z-10 flex flex-col justify-center flex-grow"
            >
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 items-center lg:items-end">
                
                <div className="lg:col-span-7 flex flex-col items-center lg:items-start text-center lg:text-left z-20">
                  <motion.p
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ duration: 1, ease: [0.16, 1, 0.3, 1] }}
                    className="text-blue-400 font-mono text-sm sm:text-base mb-6 tracking-widest uppercase font-semibold"
                  >
                    {`//`} Creative Engineering Agency
                  </motion.p>
                  
                  <h1 className="text-[50px] sm:text-[80px] md:text-[100px] xl:text-[120px] leading-[0.85] font-inter font-black tracking-[-0.04em] mb-8 flex flex-col items-center lg:items-start">
                    {lines.map((line, lineIndex) => (
                      <div key={lineIndex} className="flex overflow-visible">
                        {line.split('').map((char, charIndex) => (
                          <motion.span
                            key={`${lineIndex}-${charIndex}`}
